<!doctype html>
<html lang="en" style="background:hsl(222 28% 7%);color-scheme:dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (stored !== 'light' && (stored === 'system' || !stored ? prefersDark : false));
          if (stored == null) isDark = true;
          window.__APP_SPLASH_DARK__ = isDark;
          var root = document.documentElement;
          root.style.background = isDark ? 'hsl(222 28% 7%)' : 'hsl(0 0% 100%)';
          root.style.colorScheme = isDark ? 'dark' : 'light';
          if (!isDark) root.classList.add('is-light');
        } catch (e) {
          window.__APP_SPLASH_DARK__ = true;
          document.documentElement.style.background = 'hsl(222 28% 7%)';
        }
      })();
    </script>
    <style>html { background: hsl(222 28% 7%); } html.is-light { background: hsl(0 0% 100%); } body { background: transparent; margin: 0; }</style>
    <title>PDVIO — Sistema de ponto de venda para o seu negócio</title>

    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 320ms ease;
      }
      #app-splash.is-dark { background: #0a0a0a; }
      #app-splash.is-hiding { opacity: 0; pointer-events: none; }
      #app-splash img {
        width: min(220px, 50vw);
        height: auto;
        animation: app-splash-pulse 1.4s ease-in-out infinite;
      }
      @keyframes app-splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.65; transform: scale(0.96); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash img { animation: none; }
      }
    </style>
  </head>

  <body>
    <div id="app-splash" aria-hidden="true">
      <img id="app-splash-logo" alt="" />
    </div>
    <script>
      (function () {
        var splash = document.getElementById('app-splash');
        var img = document.getElementById('app-splash-logo');
        var dark = window.__APP_SPLASH_DARK__;
        if (dark) splash.classList.add('is-dark');
        img.src = dark ? '/logo-dark.webp' : '/logo-light.webp';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
